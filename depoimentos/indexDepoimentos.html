<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Depoimentos</title>
  <link rel="stylesheet" href="styleDepoimentos.css"> 
  <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>
  <section class="depoimentos">
    <h1>DEPOIMENTOS</h1>
    <div class="grid">

      <div class="card" data-nome="Sarah" data-texto="a Carol (minha Ana Caracol) foi uma presença felizmente mais constante em 2025, desejo que seja muito mais para sempre">
        <img src="imgsDepoimentos/sarah.jpeg" alt="Sarah">
        <h3>Sarah</h3>
      </div>

      <div class="card" data-nome="Juliana" data-texto="A Aninha foi uma amiga muito presente na minha vida em 2025, passeamos bastante, conversamos bastante (muitas fofocas). Foi uma parte muito essencial no meu processo de vestibular e sempre me apoiou.">
        <img src="imgsDepoimentos/juliana.jpeg" alt="Juliana">

        <h3>Juliana</h3>
      </div>

      <div class="card" data-nome="João" data-texto="Em 2025, a Carol foi alguém exepcional, uma companhia incrível, comprava todas as minhas loucuras, apoiava tudo que me acontecia, e além de tudo, foi a maior amiga que eu podia ter">
        <img src ="imgsDepoimentos/joao.jpg" alt="João">
        <h3>João</h3>
      </div>
      
      <div class="card" data-nome="Duda" data-texto="A Carol, em 2025, pra mim, foi a Carol de sempre. Não me lembro de um sequer ano, aniversário ou data importante (ou não) em que a Carol não estivesse lá! Eu canso de dizer e sempre vou repetir que ela é minha alma gêmea. Mas, como nenhuma mãe ia aguentar eu, ela e a Lorena como filhas, Deus nos fez primas — e eu a considero como irmã e melhor amiga.

        Ela é a pessoa que eu chamaria se precisasse matar alguém; é a pessoa que me escuta e me aconselha quando faço as piores besteiras; a pessoa com quem não tenho vergonha de compartilhar meus pensamentos intrusivos, porque sei que ela vai rir junto kkkkk. E eu sou extremamente grata por tudo isso!

        Se eu tenho uma certeza na vida, é que nunca estarei sozinha, porque ela sempre estará lá. Te amo, Carol! E, mesmo que você nunca aceite se casar comigo, saiba que uma parte do meu coração sempre será sua! 💛">
        <img src="imgsDepoimentos/duda.jpeg" alt="Duda">
        <h3>Duda</h3>
      </div>
      
      <div class="card" data-nome="Wanilla" data-texto="Pra mim a Carol foi o motivo de eu não ter desistido de muita coisa de não ter surtado realmente ela foi tudo ela foi amiga mas ao mesmo tempo foi minha mãe foi uma pessoa da qual eu sempre pude contar">
        <img src="imgsDepoimentos/wanilla.jpeg" alt="Wanilla">
        <h3>Wanilla</h3>
      </div>

      <div class="card" data-nome="Tereza" data-texto="A Carol é uma menina determinada.
        Sabe muito bem o que quer da vida .
        É uma menina carinhosa e amiga.
        Gosta de fazer amizades e por onde passa exala seu carinho e carrega em sua exencia o bom amigo e a sinceridade e simplicidade de ser uma pessoa com caráter inexplicável.
        É uma pérola preciosa
        Carolina é única,
        É uma menina doce , carinhosa,generosa e guerreira.
        Parabéns Carol 👏🏼.
        Que Deus continue derramando muitas bençãos sobre sua vida 🙏🏼.
        Desejo tudo de melhor pra vc ❣️.
        Te amo infinitamente 💗">
        <img src="https://placehold.co/150" alt="Tereza">
        <h3>Tereza</h3>
      </div>
      
      <div class="card" data-nome="Lorena" data-texto="Em 2025, Carol foi intensidade: altos e baixos, risadas fora de hora e muitas palavras erradas, sempre falando tudo trocado, um pouco gaga e ainda achando que estava certíssima. Por isso, nosso eterno “Marco Aurélio”.

        Ela foi caos e carinho ao mesmo tempo. Drama em um minuto e abraço apertado no outro. Briga, reclama, faz cara feia… mas, cinco segundos depois, já está rindo alto como se nada tivesse acontecido. Em 2025, cresceu, mudou, aprendeu muita coisa, mas continuou sendo exatamente ela: intensa, exagerada, divertida e com o coração enorme. (Continuua no próx card)">
        <img src="imgsDepoimentos/lorena.jpeg" alt="Lorena">
        <h3>Lorena</h3>
      </div>

      <div class="card" data-nome="Lorena 2" data-texto="Transformou dias normais em histórias que só fazem sentido para quem viveu. Fez dos momentos simples os mais importantes. Foi teimosa e sensível, forte quando precisou e mole quando o coração pesou. Foi irmã, foi amiga, foi companhia.

        2025 teve o jeitinho dela em tudo: nas palavras erradas, nas risadas altas e nas conversas nada organizadas. E, sinceramente, não teria sido o mesmo ano sem ela, sendo exatamente assim. 💛">
        <img src="imgsDepoimentos/lorena.jpeg" alt="Lorena 2">
        <h3>Lorena 2</h3>
      </div>

      <div class="card" data-nome="BELTRANO" data-texto="Me emocionei com o resultado. Foi muito mais do que eu esperava!">
        <img src="https://placehold.co/150" alt="Beltrano">
        <h3>BELTRANO</h3>
      </div>
      
      <div class="card" data-nome="BELTRANO" data-texto="Me emocionei com o resultado. Foi muito mais do que eu esperava!">
        <img src="https://placehold.co/150" alt="Beltrano">
        <h3>BELTRANO</h3>
      </div>

    </div>
  </section>

  <div class="proximo">
    <a href="calendario/indexCalendario.html">Próximo</a>
  </div>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <img id="modal-img" src="" alt="">
      <h2 id="modal-nome"></h2>
      <p id="modal-texto"></p>
    </div>
  </div>

  <script src="scriptDepoiments.js"></script>
</body>
</html>
